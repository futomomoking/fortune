<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Today's Fortune</title>

<style>

body{

    margin:0;

    width:100%;
    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        180deg,
        #d1001f 0%,
        #c40018 100%
    );

    color:white;

    font-family:
    "Helvetica Neue",
    "Noto Sans JP",
    sans-serif;

    text-align:center;

    transition:
    background 1s ease;

}



/* =========================
   全体
========================= */

.container{

    position:relative;

    z-index:10;

    width:100%;

    max-width:500px;

    padding:40px 28px;

}

.sub{

    font-size:12px;

    letter-spacing:0.28em;

    opacity:0.72;

    margin-bottom:42px;

}



/* =========================
   運勢
========================= */

.result h1{

    font-size:76px;

    margin:0 0 24px;

    font-weight:300;

    letter-spacing:0.1em;

}

.message{

    font-size:18px;

    line-height:2;

    opacity:0.96;

}



/* =========================
   区切り
========================= */

.divider{

    width:120px;
    height:1px;

    background:
    rgba(255,255,255,0.28);

    margin:
    34px auto;

}



/* =========================
   ラッキーカラー
========================= */

.color{

    font-size:16px;

    line-height:1.8;

    opacity:0.82;

}



/* =========================
   誕生日
========================= */

.birthday{

    margin-top:20px;

    font-size:15px;

    line-height:1.8;

    opacity:0.82;

}

.birthdayTitle{

    margin-bottom:4px;

    font-size:13px;

    letter-spacing:0.15em;

}



/* =========================
   名前
========================= */

.name{

    margin-top:44px;

    font-size:13px;

    letter-spacing:0.25em;

    opacity:0.52;

}



/* =========================
   WARNING
========================= */

.warning{

    animation:
    warningFlash 4s infinite;

}

@keyframes warningFlash{

    0%{
        background:#150000;
    }

    50%{
        background:#550000;
    }

    100%{
        background:#150000;
    }

}

.warningText{

    font-size:30px;

    font-weight:900;

    letter-spacing:0.35em;

    margin-bottom:12px;

}

.countdown{

    font-size:12px;

    letter-spacing:0.25em;

    opacity:0.72;

}



/* =========================
   SSR
========================= */

.rainbow{

    animation:
    rainbowBg 6s linear infinite;

}

@keyframes rainbowBg{

    0%{ background:#c40018; }
    20%{ background:#8e24aa; }
    40%{ background:#3949ab; }
    60%{ background:#00897b; }
    80%{ background:#f9a825; }
    100%{ background:#c40018; }

}

.star{

    position:fixed;

    pointer-events:none;

    color:white;

    animation:
    starFlow 2.4s linear forwards;

}

@keyframes starFlow{

    0%{

        transform:
        translateY(100vh)
        translateX(0)
        scale(0.4);

        opacity:0;

    }

    20%{
        opacity:1;
    }

    100%{

        transform:
        translateY(-20vh)
        translateX(100px)
        scale(1.4);

        opacity:0;

    }

}



/* =========================
   犬
========================= */

.dog{

    position:fixed;

    bottom:12%;

    font-size:64px;

    animation:
    dogRun 5s linear forwards;

}

@keyframes dogRun{

    0%{
        right:-20%;
    }

    100%{
        right:120%;
    }

}



/* =========================
   せんべい
========================= */

.snack{

    position:fixed;

    font-size:42px;

    animation:
    snackPop 2s ease forwards;

}

@keyframes snackPop{

    0%{

        transform:
        scale(0.3);

        opacity:0;

    }

    30%{
        opacity:1;
    }

    100%{

        transform:
        translateY(-120px)
        scale(1.3);

        opacity:0;

    }

}



/* =========================
   ロゴ
========================= */

.cornerLogoWrap{

    position:fixed;

    right:18px;
    bottom:18px;

    display:flex;
    flex-direction:column;
    align-items:center;

    gap:6px;

    z-index:2;

    pointer-events:none;

    opacity:0.82;

}

.cornerLogo{

    width:68px;

    height:auto;

}

.cornerLogoText{

    text-align:center;

    line-height:1.35;

    color:#f5df8f;

    font-size:11px;

    letter-spacing:0.08em;

    font-weight:400;

}

.cornerLogoText .small{

    font-size:10px;

    opacity:0.82;

}

.cornerLogoText .logoName{

    margin-top:2px;

    font-size:12px;

    letter-spacing:0.04em;

}



/* =========================
   スマホ
========================= */

@media(max-width:600px){

    .result h1{

        font-size:58px;

    }

    .message{

        font-size:16px;

    }

    .cornerLogoWrap{

        right:12px;
        bottom:12px;

        gap:4px;

        opacity:0.72;

    }

    .cornerLogo{

        width:54px;

    }

    .cornerLogoText{

        font-size:9px;

    }

    .cornerLogoText .logoName{

        font-size:10px;

    }

}

</style>

</head>

<body>



<div class="container">

    <div class="sub">
        A SMALL FORTUNE FOR TODAY.
    </div>

    <div id="effect"></div>

    <div class="result" id="result"></div>

    <div class="name">
        — TAROMARU
    </div>

</div>



<!-- ロゴ -->

<div class="cornerLogoWrap">

    <img
    src="https://github.com/futomomoking/fortune/blob/16927f7c1a6ce8436354b3831d07b5ce922feaaa/logo.png"
    class="cornerLogo"
    alt="logo"
    />

    <div class="cornerLogoText">

        <div class="small">
            actor talent
        </div>

        <div class="logoName">
            Youta Taromaru
        </div>

    </div>

</div>



<script>

/* =========================
   一日一回固定
========================= */

function getUserId(){

    let id =
    localStorage.getItem("fortuneUserId");

    if(!id){

        id =
        Math.random()
        .toString(36)
        .substring(2,12);

        localStorage.setItem(
            "fortuneUserId",
            id
        );

    }

    return id;

}



/* =========================
   今日の日付
========================= */

function getTodayKey(){

    const today = new Date();

    return (
        today.getFullYear()
        + "-"
        + (today.getMonth()+1)
        + "-"
        + today.getDate()
    );

}



/* =========================
   擬似乱数
========================= */

function seededRandom(seed){

    let x =
    Math.sin(seed) * 10000;

    return x - Math.floor(x);

}



/* =========================
   運勢
========================= */

const fortunes = [

{
title:"大吉",
message:"今日は妙にタイミングが噛み合う日。",
color:"赤",
weight:20,
rarity:"normal"
},

{
title:"中吉",
message:"遠回りした方が、面白いこと起きるかも。",
color:"白",
weight:22,
rarity:"normal"
},

{
title:"小吉",
message:"小さいラッキーを拾える日。",
color:"水色",
weight:22,
rarity:"normal"
},

{
title:"吉",
message:"ちゃんと見てくれてる人はいる。",
color:"銀",
weight:20,
rarity:"normal"
},

{
title:"末吉",
message:"今日は無理に頑張らなくていい日。",
color:"黒",
weight:12,
rarity:"normal"
},

{
title:"半吉",
message:"半分うまくいけば今日は勝ち。",
color:"灰",
weight:10,
rarity:"normal"
},

{
title:"SSR吉",
message:"今日は世界がちょっと派手。",
color:"虹",
weight:1.8,
rarity:"ssr"
},

{
title:"犬吉",
message:"今日は犬に好かれる。",
color:"茶",
weight:1.6,
rarity:"dog"
},

{
title:"もち吉",
message:"今日はせんべい運が来てる。",
color:"白",
weight:1.5,
rarity:"snack"
},

{
title:"主人公吉",
message:"今日ちょっと画角いい。",
color:"赤",
weight:1.2,
rarity:"normal"
},

{
title:"凶",
message:"寝癖くらいなら味です。",
color:"紫",
weight:0.6,
rarity:"warning"
},

{
title:"大凶",
message:"でも今日これ引いたなら逆に強い。",
color:"黒",
weight:0.15,
rarity:"warning"
}

];



/* =========================
   誕生日
========================= */

const birthdays = [

{
date:"5-20",
name:"王貞治",
age:85
},

{
date:"5-20",
name:"オノ・ヨーコ",
age:92
},

{
date:"5-21",
name:"プラトン",
age:2453
},

{
date:"5-24",
name:"ボブ・ディラン",
age:84
}

];



function getBirthdayText(){

const today = new Date();

const key =
(today.getMonth()+1)
+
"-"
+
today.getDate();

const matched =
birthdays.filter(
b => b.date === key
);

if(matched.length === 0){

return "今日は誰かの特別な日。";

}

return matched.map(b => {

return `
${b.name}
（${b.age}歳）
`;

}).join("<br>");

}



/* =========================
   一日固定抽選
========================= */

function getDailyFortune(){

    const userId =
    getUserId();

    const todayKey =
    getTodayKey();

    let seed = 0;

    const combined =
    userId + todayKey;

    for(let i=0; i<combined.length; i++){

        seed +=
        combined.charCodeAt(i);

    }

    const random =
    seededRandom(seed);

    let totalWeight = 0;

    fortunes.forEach(f => {
        totalWeight += f.weight;
    });

    let current = 0;

    for(let fortune of fortunes){

        current +=
        fortune.weight / totalWeight;

        if(random < current){

            return fortune;

        }

    }

}



/* =========================
   演出
========================= */

function clearEffects(){

document.body.className = "";

document
.querySelectorAll(
".star,.dog,.snack"
)
.forEach(el => el.remove());



document
.getElementById("effect")
.innerHTML = "";

}



function playEffect(rarity){

clearEffects();



/* WARNING */

if(rarity === "warning"){

document.body.classList.add("warning");

document
.getElementById("effect")
.innerHTML = `

<div class="warningText">
WARNING
</div>

<div class="countdown">
SYSTEM CHECK...
</div>

`;

}



/* SSR */

if(rarity === "ssr"){

document.body.classList.add("rainbow");

for(let i=0; i<20; i++){

const star =
document.createElement("div");

star.className = "star";

star.innerHTML = "✦";

star.style.left =
Math.random() * 100 + "vw";

star.style.fontSize =
(20 + Math.random()*40)
+ "px";

star.style.animationDelay =
Math.random() * 2 + "s";

document.body.appendChild(star);

}

}



/* 犬 */

if(rarity === "dog"){

const dog =
document.createElement("div");

dog.className = "dog";

dog.innerHTML = "🐕";

document.body.appendChild(dog);

}



/* せんべい */

if(rarity === "snack"){

for(let i=0; i<8; i++){

const snack =
document.createElement("div");

snack.className = "snack";

snack.innerHTML = "🍘";

snack.style.left =
Math.random() * 100 + "vw";

snack.style.top =
(40 + Math.random()*30)
+ "vh";

snack.style.animationDelay =
Math.random() * 1 + "s";

document.body.appendChild(snack);

}

}

}



/* =========================
   表示
========================= */

function showFortune(){

const fortune =
getDailyFortune();

playEffect(fortune.rarity);

document
.getElementById("result")
.innerHTML = `

<h1>${fortune.title}</h1>

<div class="message">
${fortune.message}
</div>

<div class="divider"></div>

<div class="color">
Lucky Color — ${fortune.color}
</div>

<div class="divider"></div>

<div class="birthday">

<div class="birthdayTitle">
今日の誕生日
</div>

${getBirthdayText()}

</div>

`;

}



/* =========================
   起動
========================= */

window.onload = showFortune;

</script>

</body>
</html>
